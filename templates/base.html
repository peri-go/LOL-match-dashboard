<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KidsGraça{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Kids<span>Graça</span></a>
    {% if session.get('summoner_name') %}
      <a href="/history" class="nav-link">{{ session.get('summoner_name') }}</a>
    {% endif %}
  </nav>
  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
